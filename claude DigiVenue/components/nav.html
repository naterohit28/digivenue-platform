<!--
  DIGIVENUE — GLOBAL NAVIGATION COMPONENT
  =========================================
  This is the HTML reference fragment for the
  site navigation. Copy this <nav> block into
  every page inside the <body> opening.

  States (toggled by JS in main.js):
    .is-scrolled  — opaque background on scroll
    .is-hidden    — hidden on scroll-down
    .menu-open    — mobile drawer open

  Constitutional rules:
    — Max 5 primary nav items + 1 CTA
    — No mega-menus, no icon grids
    — "Get Audit" CTA always visible (even on mobile)
    — On mobile: hamburger + drawer
-->

<nav class="site-nav" role="navigation" aria-label="Primary navigation">

  <!-- Brand wordmark -->
  <a href="../index.html" class="nav-logo" aria-label="DigiVenue — Home"><img src="../assets/images/logo-horizontal.svg" class="nav-logo__img" alt="DigiVenue"></a>

  <!-- Desktop nav links -->
  <ul class="nav-links" role="list">
    <li>
      <a href="../pages/digistories.html"
         class="nav-link"
         aria-label="DigiStories">
        DigiStories
      </a>
    </li>
    <li>
      <a href="../pages/results.html"
         class="nav-link"
         aria-label="Results and Case Studies">
        Results
      </a>
    </li>
    <li>
      <a href="../pages/ecosystem.html"
         class="nav-link"
         aria-label="The DigiVenue Ecosystem">
        Ecosystem
      </a>
    </li>
    <li>
      <a href="../pages/about.html"
         class="nav-link"
         aria-label="About DigiVenue">
        About
      </a>
    </li>
  </ul>

  <!-- Desktop CTA — always present -->
  <div class="nav-cta">
    <a href="../pages/audit.html"
       class="btn btn--outline btn--sm"
       aria-label="Get your free venue trust audit">
      Get Audit &rarr;
    </a>
  </div>

  <!-- Mobile hamburger toggle -->
  <button class="nav-toggle"
          aria-label="Open menu"
          aria-expanded="false"
          aria-controls="mobile-drawer">
    <span class="nav-toggle__bar" aria-hidden="true"></span>
    <span class="nav-toggle__bar" aria-hidden="true"></span>
    <span class="nav-toggle__bar" aria-hidden="true"></span>
  </button>

  <!-- Mobile full-screen drawer -->
  <div class="nav-mobile-drawer"
       id="mobile-drawer"
       role="dialog"
       aria-label="Mobile navigation">

    <a href="../pages/digistories.html">DigiStories</a>
    <a href="../pages/results.html">Results</a>
    <a href="../pages/ecosystem.html">The Bigger Picture</a>
    <a href="../pages/about.html">About</a>

    <div class="nav-mobile-cta">
      <a href="../pages/audit.html"
         class="btn btn--outline"
         aria-label="Get your free venue trust audit">
        Get Your Free Audit &rarr;
      </a>
    </div>

  </div>

</nav>
